<html>
    <head>
    <title>Upload</title>
    <link rel="icon" href="https://i.ibb.co/fYVMHYdf/unavngivet.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script>
        function listFiles() {
            const fileInput = document.getElementById('file-input');
            const files = fileInput.files;
            const FileListingPart = document.querySelector('.FileListings');

            FileListingPart.innerText = '';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                let size = file.size;

                if (size > 1000000000) {
                    size = size / (1000 * 1000 * 1000);
                    size = Math.round(size).toString() + ' GB';
                } else if (size > 1000000) {
                    size = size / (1000 * 1000);
                    size = Math.round(size).toString() + ' MB';
                } else if (size > 1000) {
                    size = size / 1000;
                    size = Math.round(size).toString() + ' KB';
                } else {
                    size = size.toString() + ' bytes';
                }

                console.log(file);
                const elem = document.createElement('span');
                elem.className = 'file-item';
                elem.innerText = file.name + ' ' + size;
                FileListingPart.appendChild(elem);
            }
        }

        function setInputFiles(files) {
            const fileInput = document.getElementById('file-input');
            const dataTransfer = new DataTransfer();

            for (let i = 0; i < files.length; i++) {
                dataTransfer.items.add(files[i]);
            }
            fileInput.files = dataTransfer.files;
            listFiles();
        }

       document.addEventListener('DOMContentLoaded', function() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');

            fileInput.addEventListener('change', listFiles);

            dropZone.addEventListener('click', function() {
                fileInput.click();
            });

            dropZone.addEventListener('dragover', function(event) {
                event.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', function() {
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', function(event) {
                event.preventDefault();
                dropZone.classList.remove('dragover');

                const files = event.dataTransfer.files;
                if (files && files.length > 0) {
                    setInputFiles(files);
                }
            });

            // --- NEW: handle paste ---
            dropZone.addEventListener('paste', function(event) {
                const items = event.clipboardData.items;
                const files = [];

                for (let i = 0; i < items.length; i++) {
                    if (items[i].kind === 'file') {
                        files.push(items[i].getAsFile());
                    }
                }

                if (files.length > 0) {
                    setInputFiles(files);
                }

                event.preventDefault(); // prevent default paste (e.g., inserting text)
            });
        });

        document.addEventListener('paste', function(event) {
            const items = event.clipboardData.items;
            const files = [];

            for (let i = 0; i < items.length; i++) {
                if (items[i].kind === 'file') {
                    files.push(items[i].getAsFile());
                }
            }

            if (files.length > 0) {
                setInputFiles(files);
                event.preventDefault(); // prevent default paste behavior
            }
        });
    </script>
    
    </head>

    <body>
        <div class="main">
        <a href="/Files" class="filex">File Explorer</a>
        <div class="container">
            <div class="show-container">
            <div class="progress" id="progressBar">
                <div class="progress-number" aria-valuenow="0" ></div>
                <div class="rounded">
                <div class="progress-bar" style="width: 0;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                </div>
                </div>
            </div>
            </div>
            <form id="box" action="/upload" method="post" enctype="multipart/form-data">
                    <div class="tools" id="boxtools">
                        <div class="circle">
                        <span class="red box"></span>
                        </div>
                        <div class="circle">
                        <span class="yellow box"></span>
                        </div>
                        <div class="circle">
                        <span class="green box"></span>
                        </div>
                        <label id="labell">Upload!</label>
                    </div>

                <div id="drop-zone" class="custom-upload" tabindex="0" style="flex-direction: column; min-height: 140px; justify-content: center;">
                    <span id="drop-zone-text">Drag & drop files here, or click to browse</span>
                    <input id="file-input" type="file" name="files" multiple style="display:none;">
                </div>

                <label class="custom-upload">
                        Submit
                        <input id="submit" type="submit" value="Upload">
                </label>
                    
        
                <div id="success">
                    <div class="success__icon">
                    <svg fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="m12 1c-6.075 0-11 4.925-11 11s4.925 11 11 11 11-4.925 11-11-4.925-11-11-11zm4.768 9.14c.0878-.1004.1546-.21726.1966-.34383.0419-.12657.0581-.26026.0477-.39319-.0105-.13293-.0475-.26242-.1087-.38085-.0613-.11844-.1456-.22342-.2481-.30879-.1024-.08536-.2209-.14938-.3484-.18828s-.2616-.0519-.3942-.03823c-.1327.01366-.2612.05372-.3782.1178-.1169.06409-.2198.15091-.3027.25537l-4.3 5.159-2.225-2.226c-.1886-.1822-.4412-.283-.7034-.2807s-.51301.1075-.69842.2929-.29058.4362-.29285.6984c-.00228.2622.09851.5148.28067.7034l3 3c.0983.0982.2159.1748.3454.2251.1295.0502.2681.0729.4069.0665.1387-.0063.2747-.0414.3991-.1032.1244-.0617.2347-.1487.3236-.2554z" fill="#393a37" fill-rule="evenodd"></path></svg>
                    </div>
                    <div class="success__title">Uploaded Successfully!</div>
                    <div class="success__close" onclick="hideElement()" ><svg height="20" viewBox="0 0 20 20" width="20" xmlns="http://www.w3.org/2000/svg"><path d="m15.8333 5.34166-1.175-1.175-4.6583 4.65834-4.65833-4.65834-1.175 1.175 4.65833 4.65834-4.65833 4.6583 1.175 1.175 4.65833-4.6583 4.6583 4.6583 1.175-1.175-4.6583-4.6583z" fill="#393a37"></path></svg></div>
                </div>
                <img id="img" src="https://i.pinimg.com/originals/ba/e3/0e/bae30e0c7acfec296e5a30d0a75af0f1.gif" alt="">
                
                <input type="hidden" name="currentPath" id="currentPathInput">

            </form>





            <div class="filess">
                    <div class="tools">
                        <div class="circle">
                        <span class="red box"></span>
                        </div>
                        <div class="circle">
                        <span class="yellow box"></span>
                        </div>
                        <div class="circle">
                        <span class="green box"></span>
                        </div>
                        <label id="labell">files</label>
                    </div>
                    <div class="FileListings"></div>
            </div>


            <div class="UploadExplorer">
                <div class="tools">
                        <div class="circle">
                        <span class="red box"></span>
                        </div>
                        <div class="circle">
                        <span class="yellow box"></span>
                        </div>
                        <div class="circle">
                        <span class="green box"></span>
                        </div>
                        <label id="labell">Select a folder</label>
                    </div>
                <span class="CurrentPath">/</span>
                <div class="UploadExplorerUploadItems">
                    <div onclick="getFolders(this)" class="UploadExplorerUploadItem">
                        <img class="UploadExplorerPreviewImg" src="https://cdn-icons-png.freepik.com/256/5577/5577723.png" alt="Image">
                        <span class="filename">.</span>
                    </div>
                    
                </div>
                <label class="backbut" onclick="getFolders('..')">Back</label>
            </div>
        </div>
       



        </div>

	<script>
		const urlParams = new URLSearchParams(window.location.search);
		const success = urlParams.get("success");

		if (success == "true") {
			const successShow = document.querySelector('#success');
			successShow.style.visibility = "visible"
		}

		async function getFolders(arg) {
			const UploadExplorer = document.querySelector(".UploadExplorer")
			const UploadExplorerUploadItems = document.querySelector(".UploadExplorerUploadItems")

			let folderName;
			if (typeof arg === "string") {
				folderName = arg;
			} else {
				folderName = arg.querySelector(".filename").innerText;
			}

			const res = await fetch("/getFolders", {
				method: "POST",
				body: JSON.stringify({
					currentPath: UploadExplorer.querySelector(".CurrentPath").innerText,
					FolderToGet: folderName
				}),
				headers: {
					"Content-type": "application/json; charset=UTF-8"
				}
			})
			if (!res.ok) {
				console.log("Could Not find folder")
				return
			} 
			const data = await res.json()
			const Folders = data.Folders
			const currentPath = data.CurrentPath

			UploadExplorerUploadItems.innerHTML = ""
			
			if (Folders != null) {
				for (let i=0;i<Folders.length;i++) {
					Folders[i]
					var item = document.createElement("div")
					item.className = "UploadExplorerUploadItem"
					item.onclick = function() { getFolders(this) }
					item.innerHTML = `
						<img class="UploadExplorerPreviewImg" src="https://cdn-icons-png.freepik.com/256/5577/5577723.png" alt="Image">
						<span class="filename">${Folders[i]}</span>
						`
					UploadExplorerUploadItems.appendChild(item)
				}
			}

			UploadExplorer.querySelector(".CurrentPath").innerText = currentPath
			document.querySelector("#currentPathInput").value = currentPath

		}

		getFolders(".")
	</script>
    <script>
        function hideElement() {
            const el = document.querySelector("#success");
            if (el) {
                el.style.visibility = "hidden";
            } else {
                console.log("Element not found");
            }
        }
    </script>
    </body>
</html>
